name: API Tests

on:
  push:
    branches: [main, master, prod-ready-code]
  pull_request:
    branches: [main, master, prod-ready-code]
  workflow_dispatch:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: true
      BASE_URL: ${{ secrets.BASE_URL }}
      CLIENT_ID: ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
      SCOPE: ${{ secrets.SCOPE }}
      AUTH_URL: ${{ secrets.AUTH_URL }}
      EMAIL: ${{ secrets.EMAIL }}
      USERNAME: ${{ secrets.USERNAME }}
      PASSWORD: ${{ secrets.PASSWORD }}
      OKTA_TOTP_SECRET: ${{ secrets.OKTA_TOTP_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Validate required secrets
        shell: bash
        run: |
          missing=0
          for var in BASE_URL CLIENT_ID CLIENT_SECRET SCOPE AUTH_URL EMAIL USERNAME PASSWORD OKTA_TOTP_SECRET; do
            if [ -z "${!var}" ]; then
              echo "::error title=Missing required secret::$var is empty or not configured"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run API tests
        run: npx playwright test --project=api

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 30
